                  <form id="contact_form" class="contact-form" method="post">
                    <script>
                      async function saveFeedback(e) {
                        e.preventDefault();

                        const name = document.getElementById('form_name').value.trim();
                        const email = document.getElementById('form_email').value.trim();
                        const title = document.getElementById('form_title').value.trim() || 'Professional';
                        const message = document.getElementById('form_message').value.trim();
                        const subject = document.getElementById('form_subject').value;

                        // Basic validation
                        if (!name || !email || !message || !subject) {
                          alert('Please fill in all required fields.');
                          return false;
                        }

                        const btn = e.target;
                        const originalText = btn.innerHTML;
                        btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Sending...';
                        btn.disabled = true;

                        // TESTIMONIAL LOGIC: Save locally if subject is "Feedback"
                        // We do this before the fetch so it works even if the server is down
                        let isSavedLocally = false;
                        if (subject === 'Feedback') {
                          try {
                            const genderWrapper = document.getElementById('gender_field_wrapper');
                            const gender = (genderWrapper.style.display !== 'none')
                              ? document.getElementById('form_gender').value
                              : '';

                            const feedbacks = JSON.parse(localStorage.getItem('local_feedbacks') || '[]');
                            feedbacks.push({
                              name, title, message, gender,
                              date: new Date().toLocaleDateString()
                            });
                            localStorage.setItem('local_feedbacks', JSON.stringify(feedbacks));
                            isSavedLocally = true;
                          } catch (err) {
                            console.error('Local storage error:', err);
                          }
                        }

                        const showSuccess = () => {
                          const msgBox = document.getElementById('form_success_msg');
                          msgBox.style.display = 'block';
                          msgBox.innerHTML = '✅ <strong>Message sent successfully!</strong> Thank you, ' + name + '! I\'ll get back to you soon.';
                          
                          document.getElementById('contact_form').reset();
                          document.getElementById('gender_field_wrapper').style.display = 'none';
                          document.getElementById('other_subject_wrapper').style.display = 'none';
                          
                          setTimeout(function () { msgBox.style.display = 'none'; }, 5000);
                        };

                        try {
                          const response = await fetch('http://localhost:5000/api/contact', {
                            method: 'POST',
                            headers: {
                              'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ name, email, subject, message, title }),
                          });

                          const result = await response.json();

                          if (result.success) {
                            showSuccess();
                          } else {
                            // If it failed but we saved locally, we can still show a partial success or specific error
                            if (isSavedLocally) {
                              alert('Testimonial saved locally, but email failed to send: ' + result.message);
                              showSuccess(); // Still reset form for better UX
                            } else {
                              alert('Failed to send message: ' + result.message);
                            }
                          }
                        } catch (error) {
                          console.error('Fetch Error:', error);
                          if (isSavedLocally) {
                            // Mock success for local testing when backend is down
                            showSuccess();
                          } else {
                            alert('An error occurred. Please try again later.');
                          }
                        } finally {
                          btn.innerHTML = originalText;
                          btn.disabled = false;
                        }

                        return false;
                      }
                    </script>

                    <div id="form_success_msg"

                            <div class="form-control-border"></div>

                          </div>

                          <div class="form-group form-group-with-icon">
                            <input id="form_title" type="text" name="title" class="form-control"
                              placeholder="Your Job Title / Company">
                            <div class="form-control-border"></div>

                          <div class="form-group form-group-with-icon">
                            <select id="form_subject" name="subject" class="form-control" required="required"
                              data-error="Subject is required." style="padding: 10px 15px;" onchange="
                                const other = document.getElementById('other_subject_wrapper');
                                const gender = document.getElementById('gender_field_wrapper');
                                const genderSelect = document.getElementById('form_gender');

                                if(this.value=='Other'){

                                  document.getElementById('form_subject_other').required=true;
                                } else {
                                  other.style.display='none';
                                  document.getElementById('form_subject_other').required=false;
                                }

                                if(this.value=='Feedback'){
                                  gender.style.display='block';
                                  genderSelect.required=true;
                                } else {
                                  gender.style.display='none';
                                  genderSelect.required=false;
                                }
                              ">
                              <option value="" selected disabled>Select Subject</option>
                              <option value="General Inquiry">General Inquiry</option>
                              <option value="Job Opportunity">Job Opportunity</option>
                              <option value="Freelance Project">Freelance Project</option>
                              <option value="Feedback">Feedback</option>
                              <option value="Other">Other</option>
                            </select>
                            <div class="form-control-border"></div>

                          </div>

                          <div id="gender_field_wrapper" style="display: none; margin-top: 15px;">
                            <div class="form-group form-group-with-icon">

                                <option value="female">Female</option>
                              </select>
                              <div class="form-control-border"></div>
                            </div>
                          </div>

                          <div id="other_subject_wrapper" style="display: none; margin-top: 10px;">

                              placeholder="Please specify your subject" style="padding: 10px 15px;">

                            <div class="form-control-border"></div>

                          </div>
                        </div>
                      </div>

                      <button type="button" class="button btn-send" onclick="saveFeedback(event)">Send Message</button>
